name: Deploy to EC2 (PM2)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node (for PM2 CLI)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install PM2
        run: npm i -g pm2

      # make the SSH key available at the path your ecosystem expects
      - name: Prepare SSH key for PM2
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/team04-project.pem
          chmod 600 ~/.ssh/team04-project.pem
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy with PM2 (ecosystem inside backend/)
        env:
          PM2_HOME: ${{ github.workspace }}/.pm2
        run: |
          pm2 deploy application/backend/ecosystem.config.js production --force
