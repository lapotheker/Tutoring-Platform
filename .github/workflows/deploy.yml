name: Deploy to EC2 (PM2)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - run: npm i -g pm2

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/team04-project.pem
          chmod 600 ~/.ssh/team04-project.pem

      - name: Preload host key (best-effort)
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -T 5 -p 22 "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts || true

      - name: Deploy with PM2 (ecosystem in backend/)
        env:
          PM2_HOME: ${{ github.workspace }}/.pm2
        run: |
          pm2 deploy application/backend/ecosystem.config.js production --force
